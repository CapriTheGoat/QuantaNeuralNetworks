method_params:
  subsampling:
    input_type: number_input
    input_kwargs:
      min_value: -1
      max_value: 100_000
      value: 64
      help: Adpative EMA layer subsampling
  bocpd_gamma:
    input_type: number_input
    input_kwargs:
      min_value: 0.000
      value: 1e-4
      max_value: 1.000
      format: "%e"
      help: Exponential smoothing of forecaster weights. Smaller implies smoother.
      step: 1e-8